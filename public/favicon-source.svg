       mihrab arch over a flared open-book base. al-andalus palette.
       This is a clean vector recreation — replace with the original artwork
       and re-run scripts/generate-favicons.mjs to regenerate all sizes. -->
  <g stroke-linejoin="round" stroke-linecap="round" fill="none">
