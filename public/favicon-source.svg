    <path
      d="M256 71 L300 150 L387 125 L362 212 L441 256 L362 300 L387 387 L300 362 L256 441 L212 362 L125 387 L150 300 L71 256 L150 212 L125 125 L212 150 Z"
      stroke="#2F6E62" stroke-width="16" />

    <!-- Flared open-book base (green) -->
    <path
      d="M256 430 C220 410 180 408 140 430 C175 455 215 458 250 458 C256 455 256 445 256 430 Z"
      fill="#2F6E62" stroke="none" />
    <path
      d="M256 430 C292 410 332 408 372 430 C337 455 297 458 262 458 C256 455 256 445 256 430 Z"
      fill="#2F6E62" stroke="none" />

