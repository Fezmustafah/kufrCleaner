name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      trigger_build:
        description: Build and deploy to Cloudflare Workers
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || inputs.trigger_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Checkout private content submodule
        env:
          CONTENT_REPO_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
        run: bash scripts/checkout-content-submodule.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Astro content + Vite
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
            node_modules/.vite
            node_modules/.cache
          key: astro-${{ runner.os }}-${{ hashFiles('src/content.config.ts', 'astro.config.mjs', 'src/utils/remark-*.ts', 'src/utils/rehype-*.ts', 'src/utils/internallinks.ts') }}-${{ hashFiles('src/content/**/*.md', 'src/content/**/*.mdx') }}
          restore-keys: |
            astro-${{ runner.os }}-${{ hashFiles('src/content.config.ts', 'astro.config.mjs', 'src/utils/remark-*.ts', 'src/utils/rehype-*.ts', 'src/utils/internallinks.ts') }}-
            astro-${{ runner.os }}-

      - name: Build
        run: pnpm run build
        env:
          DEPLOYMENT_PLATFORM: cloudflare-workers

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ping Google sitemap
        run: curl "https://www.google.com/ping?sitemap=https://www.openislam.wiki/sitemap.xml"
